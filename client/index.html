<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Chat Client</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div class="container mx-auto p-4 max-w-2xl">
        <h1 class="text-2xl font-bold mb-4">Employee Management Chat</h1>
        <div class="mb-4">
            <label for="sessionId" class="block text-sm font-medium text-gray-700">Session ID</label>
            <input id="sessionId" type="text" value="default-session" class="mt-1 p-2 w-full border rounded-md" placeholder="Enter session ID">
        </div>
        <div id="chatHistory" class="bg-white p-4 rounded-md shadow-md h-96 overflow-y-auto mb-4"></div>
        <div class="flex">
            <input id="messageInput" type="text" class="flex-1 p-2 border rounded-l-md" placeholder="Type your message (e.g., 'Create employee John Doe in Sales with salary 50000')">
            <button onclick="sendMessage()" class="bg-blue-500 text-white p-2 rounded-r-md hover:bg-blue-600">Send</button>
        </div>
    </div>
    <script>
        async function sendMessage() {
            const sessionId = document.getElementById('sessionId').value;
            const message = document.getElementById('messageInput').value;
            if (!sessionId || !message) {
                alert('Please enter a session ID and message');
                return;
            }

            const chatHistory = document.getElementById('chatHistory');
            chatHistory.innerHTML += <div class="mb-2"><strong>You:</strong> ${message}</div>;

            try {
                const response = await fetch('http://localhost:8000/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId, message })
                });
                const data = await response.json();
                chatHistory.innerHTML += <div class="mb-2 text-blue-600"><strong>Assistant:</strong> ${data.reply}</div>;
                chatHistory.scrollTop = chatHistory.scrollHeight;
            } catch (error) {
                chatHistory.innerHTML += <div class="mb-2 text-red-600"><strong>Error:</strong> ${error.message}</div>;
            }

            document.getElementById('messageInput').value = '';
        }

        // Allow sending message with Enter key
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
